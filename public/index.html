<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="./style/guess.css">
    <link rel="stylesheet" href="./style/message.css">
    <title>明日方舟-猜干员</title>
</head>
<body>
    <div class="game-wrapper">
        <div class="left-panel">
            <div class="content-card card-hoverable">
                <h1>明日方舟-猜干员</h1>
                <p>🍀</p>
                <p>
                    昵称
                    <input type="text" id="nickname-input" placeholder="输入你的昵称...">
                </p>
                <p>
                    选择难度
                    <select id="difficulty-select" title="选择难度">
                        <option value="medium">6星</option>
                        <option value="hard">海猫</option>
                    </select>
                </p>
                <p>
                    选择身份
                    <select id="role-select" title="选择身份">
                        <option value="guess">我要猜</option>
                        <option value="question">我要问</option>
                    </select>
                </p>
                <p>
                    选择房间
                    <select id="room-select" title="选择房间">
                        <option value="room1">拉特兰</option>
                        <option value="room2">罗德岛</option>
                        <option value="room3">萨卡兹</option>
                    </select>
                </p>
                <button id="start-game-button" class="game-button primary">准备</button>
                <div id="game-controls"></div>
                <div class="player-section">
                    <p>玩家列表：</p>
                    <div id="player-list"></div>
                    <p id="player-status"></p>
                </div>
                <div class="status-section">
                    <p>游戏状态：<span id="game-status"></span></p>
                    <button id="refresh-data-btn" class="game-button icon">♻️</button>
                </div>
                <div id="game-info">
                    <p>游戏规则：<button id="rules-btn" class="game-button icon">❓</button></p>
                </div>
                <div id="game-control-button"></div>
            </div>
        </div>

        <div class="right-panel">
            <div id="game-card" class="content-card card-hoverable game-content">
                <div class="operators-container" id="operators-container">
                </div>
            </div>

            <div id="message-panel" class="content-card card-hoverable message-panel">
                <div id="chat-container"></div>
                <div id="message-container">
                    <input type="text" id="message-input" placeholder="输入消息...">
                    <button id="send-button">发送</button>
                </div>
            </div>
        </div>
    </div>

    <div id="floating-chat" class="floating-chat hidden">
        <div class="floating-chat-header">
            <span>聊天</span>
            <button id="toggle-chat" class="toggle-chat-btn">▼</button>
        </div>
        <div class="floating-chat-content">
            <div id="floating-chat-container"></div>
            <div id="floating-message-container">
                <input type="text" id="floating-message-input" placeholder="输入消息...">
                <button id="floating-send-button">发送</button>
            </div>
        </div>
    </div>

    <script type="module" src="./script/main.js"></script>
</body>
</html>
